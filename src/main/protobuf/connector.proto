syntax = "proto3";

package code.bankconnectors.grpc;

option java_multiple_files = true;
option java_outer_classname = "ConnectorProto";

// Request message from OBP-API to adapter
message ObpConnectorRequest {
  string method_name = 1;    // e.g. "obp.getBank", "obp.getAdapterInfo"
  string json_payload = 2;   // JSON string matching RabbitMQ DTO format
}

// Response message from adapter to OBP-API
message ObpConnectorResponse {
  string json_payload = 1;   // JSON string matching RabbitMQ DTO format
}

// Single unary RPC service
service ObpConnectorService {
  rpc ProcessObpRequest (ObpConnectorRequest) returns (ObpConnectorResponse);
}
